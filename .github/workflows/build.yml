name: Build exFAT & Package Module

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  NDK_VERSION: r26d
  NDK_URL: https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
  FUSE_VERSION: 2.9.9
  FUSE_URL: https://github.com/libfuse/libfuse/releases/download/fuse-2.9.9/fuse-2.9.9.tar.gz
  EXFAT_URL: https://github.com/relan/exfat/archive/refs/tags/v1.4.0.tar.gz
  API_LEVEL: 21
  TARGET: aarch64-linux-android

jobs:
  build:
    name: Build for Android arm64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            gettext curl unzip zip

      - name: Download & setup NDK ${{ env.NDK_VERSION }}
        run: |
          curl -fsSL "$NDK_URL" -o ndk.zip
          unzip -q ndk.zip
          echo "NDK_ROOT=$PWD/android-ndk-$NDK_VERSION"                                         >> $GITHUB_ENV
          echo "TOOLCHAIN=$PWD/android-ndk-$NDK_VERSION/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      - name: Download exFAT source
        run: |
          curl -fsSL "$EXFAT_URL" -o exfat.tar.gz
          tar -xzf exfat.tar.gz
          mv exfat-1.4.0 exfat-master

      - name: Build libfuse static (arm64)
        run: |
          set -e
          CC="$TOOLCHAIN/bin/${TARGET}${API_LEVEL}-clang"
          AR="$TOOLCHAIN/bin/llvm-ar"
          SYSROOT="$TOOLCHAIN/sysroot"
          PREFIX="$PWD/fuse-install"

          curl -fsSL "$FUSE_URL" -o fuse.tar.gz
          tar -xzf fuse.tar.gz
          cd fuse-$FUSE_VERSION

          sed -i \
            -e 's/pthread_setcancelstate(PTHREAD_CANCEL_ENABLE,  *NULL);/(void)0;/g' \
            -e 's/pthread_setcancelstate(PTHREAD_CANCEL_DISABLE, *NULL);/(void)0;/g' \
            -e 's/pthread_cancel(w->thread_id);/(void)0;/g' \
            lib/fuse_loop_mt.c

          sed -i \
            -e 's/pthread_cancel(f->prune_thread);/(void)0;/g' \
            lib/fuse.c

          ./configure \
            --host="$TARGET" \
            --prefix="$PREFIX" \
            --disable-shared \
            --enable-static \
            --disable-util \
            --disable-example \
            CC="$CC" \
            AR="$AR" \
            CFLAGS="-D__ANDROID__ -D_FILE_OFFSET_BITS=64 -Os \
                    -Wno-implicit-function-declaration \
                    --sysroot=$SYSROOT \
                    -I$SYSROOT/usr/include \
                    -I$SYSROOT/usr/include/aarch64-linux-android" \
            LDFLAGS="--sysroot=$SYSROOT -static-libgcc"

          make -j$(nproc)
          make install

          echo "FUSE_CFLAGS=-I$PREFIX/include"           >> $GITHUB_ENV
          echo "FUSE_LIBS=-L$PREFIX/lib -lfuse -lpthread" >> $GITHUB_ENV
          echo "FUSE_PREFIX=$PREFIX"                      >> $GITHUB_ENV
          echo "CC_CROSS=$CC"                             >> $GITHUB_ENV
          echo "AR_CROSS=$AR"                             >> $GITHUB_ENV
          echo "STRIP_CROSS=$TOOLCHAIN/bin/llvm-strip"   >> $GITHUB_ENV
          echo "SYSROOT_PATH=$SYSROOT"                   >> $GITHUB_ENV

      - name: Build exFAT (arm64)
        run: |
          set -e
          cd exfat-master

          autoreconf --install

          mkdir -p "$PWD/../fake-pc"
          cat > "$PWD/../fake-pc/pkg-config" << 'PKGEOF'
          #!/bin/bash
          case "$*" in
            *--cflags*fuse3*) exit 1 ;;
            *--exists*fuse3*) exit 1 ;;
            *--cflags*fuse*)  echo "$FUSE_CFLAGS" ;;
            *--libs*fuse*)    echo "$FUSE_LIBS" ;;
            *--exists*fuse*)  exit 0 ;;
            *)                /usr/bin/pkg-config "$@" ;;
          esac
          PKGEOF
          chmod +x "$PWD/../fake-pc/pkg-config"
          export PKG_CONFIG="$PWD/../fake-pc/pkg-config"
          export FUSE2_CFLAGS="$FUSE_CFLAGS"
          export FUSE2_LIBS="$FUSE_LIBS"

          ./configure \
            --host="$TARGET" \
            --prefix="$PWD/../exfat-install" \
            CC="$CC_CROSS" \
            AR="$AR_CROSS" \
            CFLAGS="-Os -D_FILE_OFFSET_BITS=64 \
                    --sysroot=$SYSROOT_PATH \
                    -I$SYSROOT_PATH/usr/include \
                    -I$SYSROOT_PATH/usr/include/aarch64-linux-android \
                    $FUSE_CFLAGS" \
            LDFLAGS="--sysroot=$SYSROOT_PATH -static -L$FUSE_PREFIX/lib"

          make -j$(nproc)
          make install
          echo "EXFAT_INSTALL=$PWD/../exfat-install" >> $GITHUB_ENV

      - name: Collect & strip binaries
        run: |
          set -e
          mkdir -p dist/bin
          for bin in mount.exfat-fuse mkfs.exfat fsck.exfat exfatlabel dumpexfat; do
            SRC=$(find "$EXFAT_INSTALL" -name "$bin" -type f 2>/dev/null | head -1)
            if [ -n "$SRC" ]; then
              cp "$SRC" "dist/bin/$bin"
              "$STRIP_CROSS" --strip-all "dist/bin/$bin"
              echo "OK $bin  $(du -h "dist/bin/$bin" | cut -f1)"
            else
              echo "SKIP $bin not found"
            fi
          done

      - name: Package module zip
        run: |
          set -e
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}"
          VERSION="${TAG#v}"

          cp -r module module-staging
          mkdir -p module-staging/system/bin
          cp dist/bin/* module-staging/system/bin/
          chmod 755 module-staging/system/bin/*

          sed -i "s/^version=.*/version=$TAG/"             module-staging/module.prop
          sed -i "s/^versionCode=.*/versionCode=$(date +%Y%m%d)/" module-staging/module.prop

          cd module-staging
          zip -r9 "../dist/exfat-module-${TAG}-arm64.zip" . \
            -x "*.git*" -x "__MACOSX" -x "*.DS_Store"
          cd ..

          echo "MODULE_ZIP=dist/exfat-module-${TAG}-arm64.zip" >> $GITHUB_ENV
          echo "TAG=$TAG"                                        >> $GITHUB_ENV

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: exfat-android-arm64
          path: |
            dist/bin/
            dist/*.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "exFAT Module ${{ env.TAG }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## exFAT KernelSU/Magisk Module ${{ env.TAG }}

            Fixes exFAT SD card support (64GB+) on GSI ROMs.

            ### Files
            | File | Description |
            |------|-------------|
            | `exfat-module-*-arm64.zip` | Full module (Magisk / KernelSU) |
            | `mount.exfat-fuse` | FUSE mount binary |
            | `mkfs.exfat` | Format utility |
            | `fsck.exfat` | Filesystem checker |

            ### Installation
            1. Open **KernelSU** or **Magisk**
            2. Install `exfat-module-*-arm64.zip`
            3. Reboot

            ### Requirements
            - Android 8.0+ (API 26+)
            - KernelSU or Magisk
            - Kernel with FUSE support

            ---
            Built with NDK ${{ env.NDK_VERSION }} | arm64-v8a | API ${{ env.API_LEVEL }}
          files: |
            dist/*.zip
            dist/bin/mount.exfat-fuse
            dist/bin/mkfs.exfat
            dist/bin/fsck.exfat
            dist/bin/exfatlabel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
